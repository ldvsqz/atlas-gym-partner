name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  firebase_build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm i
      
      - name: Build
        run: npm run build
      
      - name: Verify build output
        run: |
          if [ -d dist ]; then
            echo "Build successful. Contents:"
            ls -lah dist/
            find dist -name "*.js" | head -5
          else
            echo "ERROR: dist folder not found!"
            exit 1
          fi
      
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ATLAS_GYM_PARTNER }}'
          channelId: live
          projectId: atlas-gym-partner
