name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  firebase_build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm i
      
      - name: Clear previous build
        run: rm -rf dist
      
      - name: Build
        run: npm run build
      
      - name: Verify build output
        run: |
          if [ -d dist ]; then
            echo "Build successful. Contents:"
            ls -lah dist/
            find dist -name "*.js" | head -5
          else
            echo "ERROR: dist folder not found!"
            exit 1
          fi
      
      - uses: w9jds/firebase-action@v12.8.0
        with:
          args: deploy --only hosting
        env:
          # Generate with: firebase login:ci
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      
      - name: Verify deployment
        run: |
          echo "Deployment completed. Site should be available at:"
          echo "https://atlas-gym-partner.web.app"
