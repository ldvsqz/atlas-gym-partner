name: Build and Release Android APK

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

# Ensure workflow has write permissions for repository contents and releases
permissions:
  contents: write
  packages: write
jobs:
  build-web:
    runs-on: ubuntu-latest
    outputs:
      dist-path: ${{ steps.build.outputs.dist }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build web (Vite)
        id: build
        run: |
          npm run build
          echo "dist=dist" >> $GITHUB_OUTPUT

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist

  android-capacitor:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: ./dist

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: '33'
          build-tools: '33.0.2'

      - name: Install Capacitor CLI and Android platform
        run: |
          npm ci || npm install
          npm i --no-save @capacitor/cli @capacitor/core @capacitor/android

      - name: Ensure capacitor config & sync android
        run: |
          test -f capacitor.config.json || (echo 'Missing capacitor.config.json' && exit 1)
          npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build Android (Gradle)
        working-directory: android
        run: ./gradlew assembleRelease -x lint

      - name: Prepare signing keystore
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          if [ -n "$ANDROID_KEYSTORE" ]; then
            echo "Decoding ANDROID_KEYSTORE secret to android/keystore.jks"
            echo "$ANDROID_KEYSTORE" | base64 --decode > android/keystore.jks
          else
            echo "ANDROID_KEYSTORE secret not set; skipping keystore preparation"
          fi

      - name: Produce release APK (handle AAB or APK outputs)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -e
          echo "Listing build output folders for debugging:"
          ls -la android || true
          ls -la android/app/build || true
          ls -la android/app/build/outputs || true
          echo "Searching for artifacts (AAB/APK)..."
          # Prefer AAB (bundle) if present, else APKs
          aab=$(find android -type f -name "*.aab" | head -n1)
          unsigned_apk=$(find android -type f -name "*-unsigned.apk" | head -n1)
          fallback_apk=$(find android -type f -name "*release*.apk" | grep -v '\-aligned\.' | head -n1)
          echo "aab=$aab"
          echo "unsigned_apk=$unsigned_apk"
          echo "fallback_apk=$fallback_apk"

          rm -f release.apk

          if [ -n "$aab" ]; then
            echo "Found AAB: $aab -> converting to universal APK via bundletool"
            wget -q https://github.com/google/bundletool/releases/download/1.14.0/bundletool-all-1.14.0.jar -O bundletool.jar
            if [ -f android/keystore.jks ]; then
              java -jar bundletool.jar build-apks --bundle="$aab" --output=app.apks --mode=universal --ks=android/keystore.jks --ks-pass=pass:$KEYSTORE_PASSWORD --key-pass=pass:$KEY_PASSWORD --ks-key-alias=$KEY_ALIAS
            else
              java -jar bundletool.jar build-apks --bundle="$aab" --output=app.apks --mode=universal
            fi
            unzip -p app.apks universal.apk > release.apk
          else
            # Use signed APK if possible
            src=""
            if [ -n "$unsigned_apk" ]; then
              src="$unsigned_apk"
            elif [ -n "$fallback_apk" ]; then
              src="$fallback_apk"
            fi
            if [ -z "$src" ]; then
              echo "No APK or AAB found in android outputs";
              echo "Directory listing above shows current files";
              exit 1
            fi

            if [ -f android/keystore.jks ]; then
              echo "Signing APK: $src"
              apksigner=$(which apksigner || true)
              if [ -z "$apksigner" ]; then echo "apksigner not found, ensure build-tools are installed"; exit 1; fi
              apksigner sign --ks android/keystore.jks --ks-pass pass:$KEYSTORE_PASSWORD --key-pass pass:$KEY_PASSWORD --out release.apk "$src"
            else
              echo "Keystore not present; copying APK as-is: $src"
              cp "$src" release.apk
            fi
          fi

          echo "Final artifact:"
          ls -la release.apk

      - name: Cleanup existing release assets (if any)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.ref_name }}
          REPO=${{ github.repository }}
          echo "Checking for existing release for tag $TAG"
          release_json=$(curl -s -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/$REPO/releases/tags/$TAG || true)
          release_id=$(echo "$release_json" | jq -r '.id // empty')
          if [ -n "$release_id" ]; then
            echo "Found release id: $release_id — deleting existing assets"
            echo "$release_json" | jq -r '.assets[]?.id' | while read asset_id; do
              if [ -n "$asset_id" ]; then
                echo "Deleting asset $asset_id"
                curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/$REPO/releases/assets/$asset_id || true
              fi
            done
          else
            echo "No existing release found for tag $TAG"
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: "${{ github.ref_name }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release.apk
          asset_name: "atlas-${{ github.ref_name }}.apk"
          asset_content_type: application/vnd.android.package-archive
