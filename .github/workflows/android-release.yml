name: Build and Release Android APK

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  android_build_and_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: android-actions/setup-android@v2
        with:
          api-level: '33'
          build-tools: '33.0.2'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build web app
        run: npm run build
      
      - name: Prepare Capacitor
        run: |
          npm i --no-save @capacitor/cli @capacitor/core @capacitor/android
          npx cap sync android
      
      - name: Setup signing keystore
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          if [ -n "$ANDROID_KEYSTORE" ]; then
            echo "$ANDROID_KEYSTORE" | base64 -d > android/keystore.jks
          fi
          
          if [ -f android/keystore.jks ]; then
            echo "Keystore ready"
          else
            echo "Warning: Keystore not found, build will be unsigned"
          fi
      
      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease -x lint
      
      - name: Locate APK
        run: |
          find android/app/build/outputs/apk/release -name "*.apk" -exec cp {} release.apk \;
      
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$TAG" = "$GITHUB_REF" ]; then
            TAG="v$(grep '"version"' package.json | head -1 | grep -oP '"\K[^"]+')"
          fi
          
          gh release delete "$TAG" -y 2>/dev/null || true
          sleep 1
          
          gh release create "$TAG" \
            release.apk \
            --title "$TAG" \
            --generate-notes
